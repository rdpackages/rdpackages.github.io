title: RD Packages
tagline: RD Software Packages
description: Software packages for regression discontinuity designs.
keywords: regression discontinuity designs, program evaluation, causal inference, treatment effects, Python, R, Stata
url: https://rdpackages.github.io
baseurl: ""
repository: rdpackages/rdpackages.github.io
lang: en-US
timezone: America/New_York

author:
  name: RD Packages
  email: rdpackages@googlegroups.com
  url: https://rdpackages.github.io

markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false

strict_front_matter: true

defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: page

exclude:
  - README.md
  - AGENTS.md
  - LICENSE.md
  - Gemfile
  - Gemfile.lock
  - .gitignore
  - .bundle
  - .jekyll-cache
  - .jekyll-metadata
  - .jekyll-preview.*
  - .tmp
  - _site
  - vendor
  - "*.log"

version: 3.1.0
